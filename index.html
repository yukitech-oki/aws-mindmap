<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS CLF マインドマップ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --aws-orange:#FF9900;--aws-dark:#232F3E;--aws-green:#1EC782;
    --aws-red:#E53E3E;--bg:#0D1117;--card-bg:#161B22;
    --border:#30363D;--text:#E6EDF3;--text-muted:#8B949E;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .header{background:linear-gradient(135deg,var(--aws-dark) 0%,#1a2332 100%);border-bottom:2px solid var(--aws-orange);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .header-title{font-size:1.4rem;font-weight:900;color:var(--aws-orange);letter-spacing:.05em;}
  .header-sub{font-size:.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
  .progress-bar{display:flex;align-items:center;gap:12px;}
  .progress-label{font-size:.75rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
  .progress-count{font-size:1.1rem;font-weight:700;color:var(--aws-green);font-family:'JetBrains Mono',monospace;}
  .sync-status{font-size:.7rem;font-family:'JetBrains Mono',monospace;padding:3px 10px;border-radius:10px;background:rgba(30,199,130,.15);color:var(--aws-green);transition:all .3s;}
  .sync-status.syncing{background:rgba(255,153,0,.15);color:var(--aws-orange);}
  .sync-status.error{background:rgba(229,62,62,.15);color:var(--aws-red);}
  .filter-tabs{display:flex;gap:8px;padding:16px 24px;overflow-x:auto;background:var(--card-bg);border-bottom:1px solid var(--border);}
  .filter-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
  .filter-tab:hover{border-color:var(--aws-orange);color:var(--aws-orange);}
  .filter-tab.active{background:var(--aws-orange);border-color:var(--aws-orange);color:#000;font-weight:700;}
  .legend{display:flex;gap:16px;padding:12px 24px;background:var(--card-bg);border-bottom:1px solid var(--border);font-size:.78rem;color:var(--text-muted);align-items:center;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;}
  .reset-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;margin-left:auto;}
  .reset-btn:hover{border-color:var(--aws-red);color:var(--aws-red);}
  .container{padding:24px;max-width:1400px;margin:0 auto;}
  .category-section{margin-bottom:32px;border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s;}
  .category-header{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:all .2s;}
  .category-header:hover{filter:brightness(1.1);}
  .category-icon{font-size:1.5rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.1);}
  .category-name{font-size:1.1rem;font-weight:700;flex:1;}
  .category-count{font-size:.75rem;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.15);}
  .category-toggle{font-size:1.2rem;transition:transform .3s;}
  .category-section.collapsed .category-toggle{transform:rotate(-90deg);}
  /* カテゴリ画像バー */
  .category-img-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:rgba(255,255,255,.03);border-top:1px solid var(--border);flex-wrap:wrap;}
  .cat-img-label{font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
  .category-img-bar .service-images{margin-top:0;}
  .category-img-bar .upload-btn{width:40px;height:40px;font-size:1rem;}
  .category-img-bar .service-image-thumb{width:40px;height:40px;}
  .category-section.collapsed .category-img-bar{display:none;}
  .services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:16px;background:var(--bg);border-top:1px solid var(--border);}
  .category-section.collapsed .services-grid{display:none;}
  .service-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:default;transition:all .25s;position:relative;overflow:hidden;animation:fadeIn .3s ease both;}
  .service-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;opacity:0;transition:opacity .2s;}
  .service-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .service-card:hover::before{opacity:1;}
  .service-card.learned{border-color:var(--aws-green)!important;background:rgba(30,199,130,.08);}
  .service-card.learned::before{background:var(--aws-green);opacity:1;}
  .service-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;}
  .service-desc{font-size:.78rem;color:var(--text-muted);line-height:1.5;cursor:pointer;}
  .service-name{font-size:.9rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .service-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .2s;flex-shrink:0;}
  .service-card.learned .service-check{background:var(--aws-green);border-color:var(--aws-green);color:#000;}
  .service-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .service-tag{font-size:.65rem;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.08);color:var(--text-muted);}
  .tag-important{background:rgba(255,153,0,.2);color:var(--aws-orange);}
  .service-images{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
  .service-image-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .2s;}
  .service-image-thumb:hover{border-color:var(--aws-orange);transform:scale(1.05);}
  .upload-btn{width:60px;height:60px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text-muted);font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .upload-btn:hover{border-color:var(--aws-orange);color:var(--aws-orange);}
  .upload-input{display:none;}
  .cat-compute{background:linear-gradient(135deg,#1a3a5c,#1e4d7b);}.cat-compute .category-name{color:#63B3ED;}
  .cat-storage{background:linear-gradient(135deg,#2d1b69,#3730a3);}.cat-storage .category-name{color:#A78BFA;}
  .cat-database{background:linear-gradient(135deg,#1a3a2a,#166534);}.cat-database .category-name{color:#4ADE80;}
  .cat-network{background:linear-gradient(135deg,#1a2a3a,#0f4c75);}.cat-network .category-name{color:#38BDF8;}
  .cat-security{background:linear-gradient(135deg,#3a1a1a,#7f1d1d);}.cat-security .category-name{color:#FCA5A5;}
  .cat-management{background:linear-gradient(135deg,#2a2a1a,#713f12);}.cat-management .category-name{color:#FCD34D;}
  .cat-ai{background:linear-gradient(135deg,#1a1a3a,#312e81);}.cat-ai .category-name{color:#C4B5FD;}
  .cat-devtools{background:linear-gradient(135deg,#1a2a1a,#14532d);}.cat-devtools .category-name{color:#86EFAC;}
  .cat-integration{background:linear-gradient(135deg,#2a1a2a,#581c87);}.cat-integration .category-name{color:#E879F9;}
  .cat-cost{background:linear-gradient(135deg,#2a2010,#92400e);}.cat-cost .category-name{color:#FDE68A;}
  .cat-wellarch{background:linear-gradient(135deg,#1a1a2a,#1e3a5f);}.cat-wellarch .category-name{color:#7DD3FC;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-content{position:relative;max-width:90vw;max-height:90vh;}
  .modal-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;border:2px solid var(--aws-orange);}
  .modal-close{position:absolute;top:-16px;right:-16px;width:36px;height:36px;border-radius:50%;background:var(--aws-orange);color:#000;border:none;font-size:1.1rem;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .modal-delete{display:block;margin:10px auto 0;padding:6px 20px;border-radius:20px;border:1px solid var(--aws-red);background:transparent;color:var(--aws-red);font-size:.8rem;cursor:pointer;transition:all .2s;}
  .modal-delete:hover{background:var(--aws-red);color:#fff;}
  .loading-overlay{position:fixed;inset:0;background:rgba(13,17,23,.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--aws-orange);border-radius:50%;animation:spin .8s linear infinite;}
  .loading-text{color:var(--text-muted);font-size:.9rem;font-family:'JetBrains Mono',monospace;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--aws-orange);}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Firebaseに接続中...</div>
</div>

<div class="header">
  <div>
    <div class="header-title">☁️ AWS CLF マインドマップ</div>
    <div class="header-sub">タイトルをタップして学習済みにマーク</div>
  </div>
  <div class="progress-bar">
    <div class="sync-status" id="syncStatus">✅ 同期済み</div>
    <div class="progress-label">学習済み</div>
    <div class="progress-count" id="progress">0 / 0</div>
  </div>
</div>

<div class="filter-tabs">
  <button class="filter-tab active" data-filter="all">すべて</button>
  <button class="filter-tab" data-filter="learned">✅ 学習済み</button>
  <button class="filter-tab" data-filter="unlearned">📚 未学習</button>
  <button class="filter-tab" data-filter="important">⭐ 重要</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--aws-green)"></div>学習済み</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>未学習</div>
  <div class="legend-item"><span style="color:var(--aws-orange);font-size:.7rem">⭐重要</span>CLF頻出</div>
  <button class="reset-btn" id="resetBtn">🔄 リセット</button>
</div>

<div class="container" id="mainContainer"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <button class="modal-delete" id="modalDelete">🗑️ この画像を削除</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== Firebase初期化 =====
const firebaseConfig = {
  apiKey: "AIzaSyA4yfjhifqEr66WNHfZyDh4kUuD14VcUn0",
  authDomain: "aws-mindmap.firebaseapp.com",
  projectId: "aws-mindmap",
  storageBucket: "aws-mindmap.firebasestorage.app",
  messagingSenderId: "835045533221",
  appId: "1:835045533221:web:bb9bc812a116977bd001cc"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const USER_ID = 'yukitech-oki';
const userRef = doc(db, 'users', USER_ID);

// ===== 状態 =====
let learnedSet = new Set();
let imagesMap = {};
let currentFilter = 'all';
let currentModalId = null;
let currentModalImgIndex = null;
let saveTimer = null;

// ===== Firestore =====
function setSyncStatus(state) {
  const el = document.getElementById('syncStatus');
  if (state === 'ok') { el.textContent = '✅ 同期済み'; el.className = 'sync-status'; }
  else if (state === 'syncing') { el.textContent = '🔄 同期中...'; el.className = 'sync-status syncing'; }
  else { el.textContent = '⚠️ エラー'; el.className = 'sync-status error'; }
}

async function loadData() {
  const snap = await getDoc(userRef);
  return snap.exists() ? snap.data() : {};
}

function saveData(patch) {
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await setDoc(userRef, patch, { merge: true });
      setSyncStatus('ok');
    } catch(e) {
      console.error('保存エラー詳細:', e.code, e.message);
      setSyncStatus('error');
    }
  }, 800);
}

// ===== データ定義 =====
const categories = [
  { id:'compute', name:'コンピューティング', icon:'🖥️', cls:'cat-compute', services:[
    {name:'EC2',desc:'仮想サーバー。インスタンスタイプでCPU・メモリを選択。オンデマンド・スポット・リザーブドの料金体系あり',tags:['IaaS','重要']},
    {name:'Lambda',desc:'サーバーレス関数実行。コードをアップするだけで実行。100万リクエストまで無料枠あり',tags:['サーバーレス','重要']},
    {name:'ECS',desc:'コンテナ管理サービス。DockerコンテナをAWS上で動かす',tags:['コンテナ']},
    {name:'EKS',desc:'Kubernetes管理サービス。本格的なコンテナオーケストレーション',tags:['コンテナ','k8s']},
    {name:'Fargate',desc:'サーバーレスのコンテナ実行環境。EC2インスタンスの管理不要',tags:['コンテナ','サーバーレス']},
    {name:'Elastic Beanstalk',desc:'アプリをデプロイするだけでインフラを自動構築するPaaS',tags:['PaaS']},
    {name:'Lightsail',desc:'簡単に使えるVPS。WordPressなどの構築が簡単',tags:['VPS']},
    {name:'Batch',desc:'バッチ処理の管理サービス。大規模な並列処理に対応',tags:['バッチ']},
    {name:'App Runner',desc:'コンテナアプリを簡単にデプロイ・実行',tags:['コンテナ']},
    {name:'Outposts',desc:'オンプレミス環境にAWSインフラを設置するサービス',tags:['ハイブリッド']},
    {name:'Wavelength',desc:'5Gネットワークのエッジに展開する超低遅延サービス',tags:['エッジ']},
    {name:'Local Zones',desc:'ユーザーに近い都市圏に展開する低レイテンシーサービス',tags:['エッジ']},
  ]},
  { id:'storage', name:'ストレージ', icon:'💾', cls:'cat-storage', services:[
    {name:'S3',desc:'オブジェクトストレージ。無制限の容量。99.999999999%の耐久性。静的Webサイトホスティングにも使用可',tags:['重要','オブジェクト']},
    {name:'EBS',desc:'EC2にアタッチするブロックストレージ。EC2インスタンスのハードディスク',tags:['ブロック','重要']},
    {name:'EFS',desc:'複数EC2から同時アクセス可能なファイルストレージ',tags:['ファイル']},
    {name:'S3 Glacier',desc:'S3の低コスト長期保存。アーカイブ用途。取り出しに時間がかかる',tags:['アーカイブ','重要']},
    {name:'Storage Gateway',desc:'オンプレミスとS3を連携するハイブリッドストレージ',tags:['ハイブリッド']},
    {name:'FSx',desc:'WindowsやLustreのマネージドファイルシステム',tags:['ファイル']},
    {name:'Backup',desc:'AWS全サービスのバックアップを一元管理',tags:['バックアップ']},
    {name:'DataSync',desc:'オンプレとAWS間のデータ転送を自動化',tags:['移行']},
    {name:'Snowball',desc:'物理デバイスを使った大容量データの移行サービス',tags:['移行','重要']},
  ]},
  { id:'database', name:'データベース', icon:'🗄️', cls:'cat-database', services:[
    {name:'RDS',desc:'マネージドリレーショナルDB。MySQL・PostgreSQL・Oracle・SQLServerなど対応。マルチAZ自動バックアップ',tags:['リレーショナル','重要']},
    {name:'Aurora',desc:'AWSオリジナルの高性能DB。MySQL/PostgreSQL互換。RDSの5倍の性能',tags:['リレーショナル','重要']},
    {name:'DynamoDB',desc:'サーバーレスのNoSQL。超高速・無制限スケール。モバイル・ゲームに最適',tags:['NoSQL','重要']},
    {name:'ElastiCache',desc:'インメモリキャッシュ。Redis/Memcached対応。DBの負荷軽減',tags:['キャッシュ']},
    {name:'Redshift',desc:'データウェアハウス。大量データの分析用DB',tags:['分析','重要']},
    {name:'Neptune',desc:'グラフデータベース。SNSのフォロー関係などに最適',tags:['グラフ']},
    {name:'DocumentDB',desc:'MongoDBと互換性があるドキュメントDB',tags:['NoSQL']},
    {name:'MemoryDB',desc:'Redis互換の高耐久インメモリDB',tags:['インメモリ']},
  ]},
  { id:'network', name:'ネットワーク・コンテンツ配信', icon:'🌐', cls:'cat-network', services:[
    {name:'VPC',desc:'AWSクラウド内の仮想ネットワーク。サブネット・ルートテーブル・IGWで構成',tags:['重要','ネットワーク']},
    {name:'Route53',desc:'DNSサービス。ドメイン名をIPアドレスに変換。ヘルスチェック機能あり',tags:['DNS','重要']},
    {name:'CloudFront',desc:'CDNサービス。世界750以上のエッジから高速配信。S3と組み合わせて使用',tags:['CDN','重要']},
    {name:'ELB',desc:'ロードバランサー。ALB（HTTP）・NLB（TCP）・CLB（旧世代）の3種類',tags:['負荷分散','重要']},
    {name:'API Gateway',desc:'APIの作成・管理・公開。Lambdaと組み合わせてサーバーレスAPI',tags:['API','重要']},
    {name:'Direct Connect',desc:'オンプレミスとAWSを専用線で接続。安定した帯域幅',tags:['専用線']},
    {name:'VPN Gateway',desc:'オンプレミスとVPCをVPN接続',tags:['VPN']},
    {name:'Transit Gateway',desc:'複数VPCとオンプレを集中管理するハブ',tags:['ハブ']},
    {name:'Global Accelerator',desc:'Anycastで世界中のユーザーのレイテンシーを最適化',tags:['高速化']},
  ]},
  { id:'security', name:'セキュリティ・アイデンティティ', icon:'🔒', cls:'cat-security', services:[
    {name:'IAM',desc:'ユーザー・グループ・ロール・ポリシーでAWSリソースへのアクセスを管理。最小権限の原則が重要',tags:['重要','アクセス管理']},
    {name:'KMS',desc:'暗号化キーの管理サービス。S3・RDS・EBSの暗号化に使用',tags:['暗号化','重要']},
    {name:'WAF',desc:'WebアプリのファイアウォールSQLインジェクション・XSSから保護',tags:['Webセキュリティ']},
    {name:'Shield',desc:'DDoS攻撃からの保護。StandardはすべてのAWSユーザーに無料提供',tags:['DDoS','重要']},
    {name:'GuardDuty',desc:'機械学習で脅威を自動検知するセキュリティモニタリング',tags:['脅威検知']},
    {name:'Inspector',desc:'EC2・コンテナの脆弱性スキャン',tags:['脆弱性']},
    {name:'Macie',desc:'S3のPII（個人情報）を自動検知・保護',tags:['データ保護']},
    {name:'Cognito',desc:'ユーザー認証・認可。モバイル・WebアプリのログインをAWSで管理',tags:['認証']},
    {name:'Secrets Manager',desc:'DBのパスワードなどの秘密情報を安全に管理・ローテーション',tags:['シークレット']},
    {name:'Certificate Manager',desc:'SSL/TLS証明書を無料で発行・管理',tags:['SSL/TLS']},
    {name:'Organizations',desc:'複数AWSアカウントを一元管理。SCP（サービス制御ポリシー）で統制',tags:['マルチアカウント','重要']},
    {name:'Artifact',desc:'AWSのコンプライアンスレポートをダウンロード',tags:['コンプライアンス']},
  ]},
  { id:'management', name:'マネジメント・監視・ガバナンス', icon:'📊', cls:'cat-management', services:[
    {name:'CloudWatch',desc:'メトリクス・ログ・アラートの監視サービス。EC2のCPU使用率などを監視',tags:['重要','監視']},

// ===== 画像保存 =====
function saveImages() {
  const json = JSON.stringify(imagesMap);
  const sizeKB = Math.round(json.length / 1024);
  console.log('画像データサイズ:', sizeKB, 'KB');
  if (sizeKB > 800) {
    console.warn('画像データが大きすぎます: ' + sizeKB + 'KB');
    return;
  }
  saveData({ images: imagesMap });
}

// ===== モーダル =====
function openModal(id, index) {
  const imgs = imagesMap[id] || [];
  if (!imgs[index]) return;
  currentModalId = id;
  currentModalImgIndex = index;
  document.getElementById('modalImg').src = imgs[index];
  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalDelete').addEventListener('click', () => {
  if (currentModalId === null) return;
  if (!confirm('この画像を削除しますか？')) return;
  const id = currentModalId;
  imagesMap[id].splice(currentModalImgIndex, 1);
  closeModal();
  saveImages();
  refreshImageArea(id);
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModalId = null;
  currentModalImgIndex = null;
}

function refreshImageArea(id) {
  const area = document.getElementById('img-area-' + id);
  if (!area) return;
  area.querySelectorAll('.service-image-thumb').forEach(t => t.remove());
  const btn = area.querySelector('button.upload-btn');
  (imagesMap[id] || []).forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'service-image-thumb';
    img.src = src;
    img.addEventListener('click', function(e) { e.stopPropagation(); openModal(id, i); });
    area.insertBefore(img, btn);
  });
}

// 画像をリサイズ・圧縮してBase64に変換
function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handleImageUpload(id, input) {
  const files = input.files;
  if (!files || files.length === 0) return;
  if (!imagesMap[id]) imagesMap[id] = [];
  const total = files.length;
  let loaded = 0;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      imagesMap[id].push(e.target.result);
      loaded++;
      if (loaded === total) {
        setTimeout(function() {
          saveImages();
          refreshImageArea(id);
        }, 0);
      }
    };
    reader.readAsDataURL(file);
  });
  setTimeout(function() { input.value = ''; }, 100);
}

// ===== 学習済み =====
function updateProgress() {
  const total = document.querySelectorAll('.service-card').length;
  const learned = document.querySelectorAll('.service-card.learned').length;
  document.getElementById('progress').textContent = learned + ' / ' + total;
}

function toggleLearn(card, id) {
  if (learnedSet.has(id)) {
    learnedSet.delete(id);
    card.classList.remove('learned');
    card.querySelector('.service-check').textContent = '';
  } else {
    learnedSet.add(id);
    card.classList.add('learned');
    card.querySelector('.service-check').textContent = '✓';
  }
  saveData({ learned: [...learnedSet] });
  updateProgress();
  applyFilter();
}

// ===== フィルター =====
function applyFilter() {
  document.querySelectorAll('.service-card').forEach(card => {
    const isLearned = card.classList.contains('learned');
    const isImportant = card.dataset.important === 'true';
    if (currentFilter === 'all') card.style.display = '';
    else if (currentFilter === 'learned') card.style.display = isLearned ? '' : 'none';
    else if (currentFilter === 'unlearned') card.style.display = !isLearned ? '' : 'none';
    else if (currentFilter === 'important') card.style.display = isImportant ? '' : 'none';
  });
}

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    applyFilter();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('学習記録をすべてリセットしますか？')) return;
  learnedSet.clear();
  saveData({ learned: [] });
  document.querySelectorAll('.service-card').forEach(card => {
    card.classList.remove('learned');
    card.querySelector('.service-check').textContent = '';
  });
  updateProgress();
});

// ===== レンダリング =====
function makeImageArea(id, small = false) {
  const area = document.createElement('div');
  area.className = 'service-images';
  area.id = 'img-area-' + id;

  const input = document.createElement('input');
  input.type = 'file';
  input.className = 'upload-input';
  input.id = 'upload-' + id;
  input.accept = 'image/*';
  input.multiple = true;
  input.addEventListener('change', function() { handleImageUpload(id, this); });

  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'upload-btn';
  btn.title = '画像を追加';
  btn.textContent = '📎';
  if (small) { btn.style.width='40px'; btn.style.height='40px'; btn.style.fontSize='1rem'; }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    e.preventDefault();
    input.click();
  });

  area.appendChild(input);
  area.appendChild(btn);

  // 既存画像を復元
  (imagesMap[id] || []).forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'service-image-thumb';
    img.src = src;
    if (small) { img.style.width='40px'; img.style.height='40px'; }
    img.addEventListener('click', function(e) { e.stopPropagation(); openModal(id, i); });
    area.insertBefore(img, btn);
  });

  return area;
}

function renderAll() {
  const container = document.getElementById('mainContainer');
  container.innerHTML = '';

  categories.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category-section';

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'category-header ' + cat.cls;
    header.innerHTML =
      '<div class="category-icon">' + cat.icon + '</div>' +
      '<div class="category-name">' + cat.name + '</div>' +
      '<div class="category-count">' + cat.services.length + 'サービス</div>' +
      '<div class="category-toggle">▼</div>';
    header.addEventListener('click', () => section.classList.toggle('collapsed'));

    // カテゴリ画像バー
    const catId = 'cat-' + cat.id;
    const catBar = document.createElement('div');
    catBar.className = 'category-img-bar';
    catBar.addEventListener('click', e => e.stopPropagation());
    const catLabelSpan = document.createElement('span');
    catLabelSpan.className = 'cat-img-label';
    catLabelSpan.textContent = '📎 カテゴリ画像';
    catBar.appendChild(catLabelSpan);
    catBar.appendChild(makeImageArea(catId, true));

    // サービスグリッド
    const grid = document.createElement('div');
    grid.className = 'services-grid';

    cat.services.forEach((svc, i) => {
      const id = cat.id + '-' + i;
      const isLearned = learnedSet.has(id);
      const isImportant = svc.tags.includes('重要');

      const card = document.createElement('div');
      card.className = 'service-card' + (isLearned ? ' learned' : '');
      card.dataset.important = isImportant;
      card.style.animationDelay = (i * 0.03) + 's';

      // ヘッダー（クリックで学習済みトグル）
      const sh = document.createElement('div');
      sh.className = 'service-header';
      sh.innerHTML =
        '<div class="service-name">' + svc.name + '</div>' +
        '<div class="service-check">' + (isLearned ? '✓' : '') + '</div>';
      sh.addEventListener('click', e => { e.stopPropagation(); toggleLearn(card, id); });

      // 説明（クリックで学習済みトグル）
      const desc = document.createElement('div');
      desc.className = 'service-desc';
      desc.textContent = svc.desc;
      desc.addEventListener('click', e => { e.stopPropagation(); toggleLearn(card, id); });

      // タグ
      const tags = document.createElement('div');
      tags.className = 'service-tags';
      svc.tags.forEach(t => {
        const span = document.createElement('span');
        span.className = 'service-tag' + (t === '重要' ? ' tag-important' : '');
        span.textContent = t === '重要' ? '⭐ CLF頻出' : t;
        tags.appendChild(span);
      });

      card.appendChild(sh);
      card.appendChild(desc);
      card.appendChild(tags);
      card.appendChild(makeImageArea(id));
      grid.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(catBar);
    section.appendChild(grid);
    container.appendChild(section);
  });

  updateProgress();
}

// ===== 初期化 =====
async function init() {
  // まずローディングを5秒後に強制非表示（保険）
  const forceShow = setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
    renderAll();
  }, 5000);

  try {
    const data = await loadData();
    if (data.learned) learnedSet = new Set(data.learned);
    if (data.images) imagesMap = data.images;
    setSyncStatus('ok');
  } catch(e) {
    console.error('読み込みエラー:', e.message);
    setSyncStatus('error');
  }

  clearTimeout(forceShow);
  document.getElementById('loadingOverlay').style.display = 'none';
  renderAll();
  // Firestore読み込み後に画像を全エリアに反映
  Object.keys(imagesMap).forEach(id => refreshImageArea(id));
}

init();
